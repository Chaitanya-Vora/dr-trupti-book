<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>A Concise Textbook of Gynaecology — Dr. Trupti Mangesh Deorukhkar</title>
    <style>
        /* ADD THIS FOR THE NEW SAMPLE MODAL */
        #sample-modal {
            display:none; position:fixed; inset:0; z-index:10000; 
            background:rgba(28,10,18,0.92); backdrop-filter:blur(10px); 
            align-items:center; justify-content:center; padding:1.5rem;
        }
        .modal-content {
            background:#faf4ea; width:100%; max-width:500px; padding:2.5rem; 
            position:relative; border-top:4px solid #c9a84c; text-align:center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .modal-close { position:absolute; top:1rem; right:1rem; cursor:pointer; font-size:1.5rem; color:#8a6070; }
        .modal-input { width:100%; padding:0.8rem; margin:1rem 0; border:1px solid rgba(201,168,76,.3); background:white; }
    </style>
</head>
<body>

<div id="sample-modal">
    <div class="modal-content">
        <div class="modal-close" id="close-modal">&times;</div>
        <h3 style="font-family:'Cormorant Garamond',serif; font-size:1.8rem;">Request Sample Chapter</h3>
        <p style="font-size:0.8rem; color:#8a6070; margin-top:0.5rem;">Enter your email to receive a clinical preview PDF.</p>
        <input type="email" class="modal-input" placeholder="Enter your professional email">
        <button class="btn-primary" style="width:100%; border:none;">Send Preview</button>
    </div>
</div>

<script>
/* 1. THE CRITIQUE FIX: MOBILE SENSITIVITY */
const isTouch = window.matchMedia("(pointer: coarse)").matches;
if (isTouch) {
    document.getElementById('cursor-dot').style.display = 'none';
    document.getElementById('cursor-ring').style.display = 'none';
    document.body.style.cursor = 'auto';
}

/* 2. THE CONVERSION FEATURE: SAMPLE PREVIEW */
const modal = document.getElementById('sample-modal');
document.querySelector('.btn-secondary').addEventListener('click', (e) => {
    e.preventDefault();
    modal.style.display = 'flex';
});
document.getElementById('close-modal').addEventListener('click', () => modal.style.display = 'none');

/* 3. PERFORMANCE TWEAK: REDUCED MOTION */
// Disables heavy parallax for users who prefer reduced motion
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    gsap.globalTimeline.clear();
}

/* [Keep all your other original GSAP and Animation logic here] */
</script>
</body>
</html>
